<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">

  <title>Product card</title>
</head>
<body>
<div class="all_elements" style="font-family: montserrat;">
  <h1 class="tittle">Выбери свой продукт</h1>
  <div class="buttons">
    <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
    <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
    <button id="open-google-button">Открыть Google</button>
    <button id="recolor-button">Нажми</button>
  </div> 
  <script src="/sript.js"></script>
  <script src="/homework-5.js"></script>
  <script src="/homework-6.js"></script>
  <script type="module" src="/homework-7.js"></script>
  <script type="module" src="/homework-8.js"></script>

<ul class="product-card-wrapper" id="product-list"></ul>

<template id="product-template">
  <li class="product-card">
    <img class="product-card-img" />
    <p class="product-card__for-skin"></p>
    <h2 class="product-card__tittle"></h2>
    <p class="product-card__descr"></p>
    <p class="product-card__text">Состав:</p>
    <ul class="product-card__composition"></ul>
    <div class="product-card__price-wrapper">
      <span class="product-card__price-text">Цена</span>
      <span class="product-card__price"></span>
    </div>
  </li>
</template>
</body>
</html>
